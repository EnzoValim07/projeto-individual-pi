<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handebol | Mural de Avisos</title>

    <link rel="stylesheet" href="./../css/dashboards.css">
    <link rel="stylesheet" href="./../css/estilo.css" />
    <link rel="icon" href="../assets/icon/861512.png" />
    <script src="../js/sessao.js"></script>

    <link rel="preconnect" href="https://fonts.gstatic.com">
</head>

<body onload="validarSessao(), verificarPermissao(), atualizarFeed()">

    <div class="janela">

        <!-- Barra lateral -->
        <div class="header-left">
            <h1>🤾 Handebol</h1>
            <div class="hello">
                <h3>Olá, <span id="b_usuario">usuário</span>!</h3>
            </div>
            <div class="btn-nav-white">
                <a href="./cards.html"><h3>Dashboard</h3></a>
            </div>
            <div class="btn-nav">
                <h3>Mural de Avisos</h3>
            </div>
            <div class="btn-logout" onclick="limparSessao()">
                <h3>Sair</h3>
            </div>
        </div>

        <!-- Conteúdo principal -->
        <div class="dash">

            <p class="dash-titulo">Mural de Avisos</p>

            <!-- Formulário de publicação (liberado só para >50%) -->
            <div id="formPublicar" style="display:none;">
                <p class="dash-subtitulo">Publicar um Aviso</p>
                <div class="mural-form">
                    <div class="campo-mural">
                        <span>Título:</span>
                        <input id="titulo" maxlength="100" type="text" placeholder="Título do aviso" />
                    </div>
                    <div class="campo-mural">
                        <span>Descrição (máximo de 250 caracteres):</span>
                        <textarea id="textarea_descricao" maxlength="250" rows="5" placeholder="Escreva seu aviso aqui..."></textarea>
                    </div>
                    <button class="botao botao-mural" onclick="publicar()">Publicar</button>
                </div>
            </div>

            <!-- Aviso de bloqueio -->
            <div id="muralBloqueado" style="display:none;">
                <div class="mural-bloqueado">
                    <span>🔒</span>
                    <p>Você precisa de mais de <strong>50% de aproveitamento</strong> no quiz para publicar avisos.</p>
                </div>
            </div>

            <!-- Feed de avisos -->
            <div>
                <p class="dash-subtitulo">Avisos Publicados</p>
                <div id="feed_container" class="lista-avisos">
                    <p style="color:#aaa;">Carregando avisos...</p>
                </div>
            </div>

        </div>
    </div>

</body>
</html>

<script>

    function verificarPermissao() {
        fetch("/quiz/listar")
            .then(res => res.json())
            .then(function (dados) {
                var nomeUsuario = sessionStorage.NOME_USUARIO;
                var meuResultado = dados.find(item => item.nome === nomeUsuario);

                if (meuResultado) {
                    var aproveitamento = Math.round((meuResultado.acertos / 5) * 100);
                    if (aproveitamento > 50) {
                        document.getElementById("formPublicar").style.display = "block";
                    } else {
                        document.getElementById("muralBloqueado").style.display = "block";
                    }
                }
            })
            .catch(erro => console.log("Erro ao verificar permissão: ", erro));
    }

    function publicar() {
        var idUsuario = sessionStorage.ID_USUARIO;
        var titulo = document.getElementById("titulo").value;
        var descricao = document.getElementById("textarea_descricao").value;

        if (titulo == "" || descricao == "") {
            alert("Preencha o título e a descrição!");
            return false;
        }

        fetch("/avisos/publicar/" + idUsuario, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ titulo: titulo, descricao: descricao })
        })
        .then(function (resposta) {
            if (resposta.ok) {
                alert("Aviso publicado com sucesso!");
                document.getElementById("titulo").value = "";
                document.getElementById("textarea_descricao").value = "";
                atualizarFeed();
            } else {
                throw "Houve um erro ao publicar o aviso! Código: " + resposta.status;
            }
        })
        .catch(erro => console.log("#ERRO: ", erro));

        return false;
    }

    function editar(idAviso) {
        sessionStorage.ID_POSTAGEM_EDITANDO = idAviso;
        alert("Você será redirecionado à página de edição do aviso de ID: " + idAviso);
        window.location = "/dashboard/edicao-aviso.html";
    }

    function deletar(idAviso) {
        if (!confirm("Tem certeza que deseja excluir este aviso?")) return;

        fetch("/avisos/deletar/" + idAviso, {
            method: "DELETE",
            headers: { "Content-Type": "application/json" }
        })
        .then(function (resposta) {
            if (resposta.ok) {
                alert("Aviso deletado com sucesso!");
                atualizarFeed();
            } else {
                throw "Houve um erro ao deletar o aviso! Código: " + resposta.status;
            }
        })
        .catch(erro => console.log("#ERRO: ", erro));
    }

    function atualizarFeed() {
        fetch("/avisos/listar")
            .then(function (resposta) {
                if (resposta.status == 204) {
                    document.getElementById("feed_container").innerHTML = "<p style='color:#aaa;'>Nenhum aviso publicado ainda.</p>";
                    return;
                }

                if (resposta.ok) {
                    resposta.json().then(function (avisos) {
                        var feed = document.getElementById("feed_container");
                        feed.innerHTML = "";

                        var idUsuarioLogado = Number(sessionStorage.ID_USUARIO);

                        for (let i = 0; i < avisos.length; i++) {
                            var aviso = avisos[i];
                            var idAviso = Number(aviso.idAviso);
                            var ehMeu = Number(aviso.idUsuario) === idUsuarioLogado;

                            var divAviso = document.createElement("div");
                            divAviso.className = "aviso-card";

                            
                            var botoesHtml = "";
                            if (ehMeu) {
                                botoesHtml = '<div class="aviso-botoes">' +
                                    '<button class="botao-editar" onclick="editar(' + idAviso + ')">✏️ Editar</button>' +
                                    '<button class="botao-deletar" onclick="deletar(' + idAviso + ')">🗑 Excluir</button>' +
                                    '</div>';
                            }

                            divAviso.innerHTML =
                                '<div class="aviso-header">' +
                                    '<span class="aviso-titulo">' + aviso.titulo + '</span>' +
                                    '<span class="aviso-autor">por ' + aviso.nome + '</span>' +
                                '</div>' +
                                '<p class="aviso-descricao">' + aviso.descricao + '</p>' +
                                botoesHtml;

                            feed.appendChild(divAviso);
                        }
                    });
                } else {
                    throw "Houve um erro na API!";
                }
            })
            .catch(erro => console.error(erro));
    }

</script>
