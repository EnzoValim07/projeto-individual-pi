<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handebol | Editar Aviso</title>

    <link rel="stylesheet" href="./../css/dashboards.css">
    <link rel="stylesheet" href="./../css/estilo.css" />
    <link rel="icon" href="../assets/imgs/fotoInicial.webp" />
    <script src="../js/sessao.js"></script>

    <link rel="preconnect" href="https://fonts.gstatic.com">
</head>

<body onload="validarSessao(), carregarAviso()">

    <div class="janela">

        <!-- Barra lateral -->
        <div class="header-left">
            <h1 class="titulo logo-bola">HANDEBOL</h1>
            <div class="hello">
                <h3>Olá, Atleta <span id="b_usuario">usuário</span>!</h3>
            </div>
            <div class="btn-nav-white">
                <a href="./cards.html"><h3>Perfil</h3></a>
            </div>
            <div class="btn-nav-white">
                <a href="./cards.html"><h3>Ranking</h3></a>
            </div>
            <div class="btn-nav-white">
                <a href="./mural.html"><h3>Mural de Avisos</h3></a>
            </div>
            <div class="btn-logout" onclick="limparSessao()">
                <h3>Sair</h3>
            </div>
        </div>

        <!-- Conteúdo principal -->
        <div class="dash">

            <p class="dash-titulo">Editar Aviso</p>

            <div class="mural-form">
                <div class="campo-mural">
                    <span>ID do Aviso:</span>
                    <input id="input_id" type="text" disabled style="opacity: 0.5; cursor: not-allowed;" />
                </div>
                <div class="campo-mural">
                    <span>Autor:</span>
                    <input id="input_nome" type="text" disabled style="opacity: 0.5; cursor: not-allowed;" />
                </div>
                <div class="campo-mural">
                    <span>Título:</span>
                    <input id="input_titulo" type="text" />
                </div>
                <div class="campo-mural">
                    <span>Descrição (máximo de 250 caracteres):</span>
                    <textarea id="textarea_descricao" maxlength="250" rows="5" placeholder="Nova descrição..."></textarea>
                </div>
                <div style="display: flex; gap: 12px;">
                    <button class="botao botao-mural" onclick="editar()">Salvar alteração</button>
                    <a href="./mural.html" class="botao botao-mural" style="background-color: transparent; border: 2px solid #d4b62c; color: #d4b62c; text-decoration: none; display: flex; align-items: center;">Cancelar</a>
                </div>
            </div>

        </div>
    </div>

</body>
</html>

<script>

    function carregarAviso() {
        var idAviso = sessionStorage.ID_POSTAGEM_EDITANDO;

        if (!idAviso) {
            alert("Nenhum aviso selecionado para edição!");
            window.location = "/dashboard/mural.html";
            return;
        }

        fetch("/avisos/listar")
            .then(res => res.json())
            .then(function (avisos) {
                var aviso = avisos.find(a => a.idAviso == idAviso);

                if (aviso) {
                    document.getElementById("input_id").value = aviso.idAviso;
                    document.getElementById("input_nome").value = aviso.nome;
                    document.getElementById("input_titulo").value = aviso.titulo;
                    document.getElementById("textarea_descricao").value = aviso.descricao;
                } else {
                    alert("Aviso não encontrado!");
                    window.location = "/dashboard/mural.html";
                }
            })
            .catch(erro => console.log("Erro ao carregar aviso: ", erro));
    }

    function editar() {
        var idAviso = sessionStorage.ID_POSTAGEM_EDITANDO;
        var novaDescricao = document.getElementById("textarea_descricao").value;

        if (novaDescricao == "") {
            alert("A descrição não pode estar vazia!");
            return;
        }

        fetch(`/avisos/editar/${idAviso}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ descricao: novaDescricao })
        })
        .then(function (resposta) {
            if (resposta.ok) {
                alert("Aviso atualizado com sucesso!");
                sessionStorage.removeItem("ID_POSTAGEM_EDITANDO");
                window.location = "/dashboard/mural.html";
            } else {
                throw "Houve um erro ao editar o aviso! Código: " + resposta.status;
            }
        })
        .catch(erro => console.log("#ERRO: ", erro));
    }

</script>
