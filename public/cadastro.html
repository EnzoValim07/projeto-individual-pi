<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Handebol | Cadastro</title>

  <script src="./js/sessao.js"></script>

  <link rel="stylesheet" href="./css/estilo.css" />
  <link rel="icon" href="./assets/icon/861512.png" />
  <link rel="preconnect" href="https://fonts.gstatic.com" />
</head>

<body onload="listar()">
  <!--header inicio-->
  <div class="header">
    <div class="container"><a href="index.html">
    <h1 class="titulo"><img src="assets\imgs\861512.png" class="logo-bola">Handebol</h1>
  </a>
      <ul class="navbar">
        <li>
          <a href="index.html">Inicial</a>
        </li>
        <li>|</li>
        <li>
          <a href="login.html">Login</a>
        </li>
        <li class="agora">
          <a href="#">Cadastro</a>
        </li>
      </ul>
    </div>
  </div>
  <!--header fim-->

  <div class="login">
    <div class="container">
      <div class="card card-cadastro">
        <h2>Bem-vindo!</h2>
        <div class="formulario">
          <div class="campo">
            <span>Nome:</span>
            <input id="nome_input" type="text" placeholder="Seu nome" />
          </div>
          <div class="campo">
            <span>Você já conhecia o Handebol?</span>
            <select id="conhece_handebol" name="conhece">
              <option value="">Selecione...</option>
            </select>
          </div>
          <div class="campo">
            <span>E-mail:</span>
            <input id="email_input" type="text" placeholder="meuemail@provedor.com" />
          </div>
          <div class="campo">
            <span>Senha:</span>
            <input id="senha_input" type="password" placeholder="******" />
          </div>
          <div class="campo">
            <span>Confirmação da Senha:</span>
            <input id="confirmacao_senha_input" type="password" placeholder="******" />
          </div>
          <div class="formulario">
            <div class="campo" id="cardErro">
              <span id="mensagem_erro"></span>
            </div>
          </div>
          <button class="botao" onclick="cadastrar()">Cadastrar</button>
        </div>
        <div id="div_aguardar" class="loading-div">
          <img src="./assets/circle-loading.gif" id="loading-gif" />
        </div>

        <div id="div_erros_login"></div>
      </div>
    </div>
  </div>

  <!--footer inicio-->
  <div class="footer-clean">
  <div class="container">

    <div class="footer-left">
      <h2>Handebol</h2>
    </div>

    <div class="footer-right">
      <p>Feito com amor por Enzo Valim&hearts; SPTech &copy; 2026</p>
    </div>

  </div>
</div>
  <!--footer fim-->
</body>

</html>

<script>

  function listar() {
    fetch('/respostas/listar')
      .then(res => res.json())
      .then(opcoes => {
        const select = document.getElementById('conhece_handebol');
        opcoes.forEach(opcao => {
          const option = document.createElement('option');
          option.value = opcao.id_resposta;
          option.textContent = opcao.descricao;
          select.appendChild(option);
        });
      });
  }

  function validarEmail(email) {
    if (!email.includes("@") || !email.includes(".")) {
      return false;
    }
    return true;
  }

  function mostrarErro(mensagem) {
    cardErro.style.display = "block";
    mensagem_erro.innerHTML = mensagem;
    setInterval(sumirMensagem, 5000);
  }

  function cadastrar() {
    var nomeVar = nome_input.value;
    var emailVar = email_input.value;
    var senhaVar = senha_input.value;
    var confirmacaoSenhaVar = confirmacao_senha_input.value;
    var conheceVar = document.getElementById('conhece_handebol').value;

    if (
      nomeVar == "" ||
      emailVar == "" ||
      senhaVar == "" ||
      confirmacaoSenhaVar == "" ||
      conheceVar == ""
    ) {
      mostrarErro("Preencha todos os campos antes de continuar!");
      finalizarAguardar();
      return false;
    }

    if (!validarEmail(emailVar)) {
      mostrarErro("E-mail inválido! Use o formato: email@provedor.com");
      finalizarAguardar();
      return false;
    }

    if (senhaVar !== confirmacaoSenhaVar) {
      mostrarErro("As senhas não coincidem! Verifique e tente novamente.");
      finalizarAguardar();
      return false;
    }

    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        nomeServer: nomeVar,
        emailServer: emailVar,
        senhaServer: senhaVar,
        conheceServer: conheceVar
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          resposta.json().then(function (json) {
            sessionStorage.setItem("ID_USUARIO", json.id);
            sessionStorage.setItem("NOME_USUARIO", json.nome);
            sessionStorage.setItem("EMAIL_USUARIO", json.email);

            cardErro.style.display = "block";
            mensagem_erro.innerHTML = "Cadastro realizado! Redirecionando para o Quiz...";

            setTimeout(() => {
              window.location = "quiz.html";
            }, 2000);
          });

          limparFormulario();
          finalizarAguardar();
        } else {
          mostrarErro("Houve um erro ao tentar realizar o cadastro!");
          finalizarAguardar();
        }
      })
      .catch(function (resposta) {
        console.log("#ERRO: " + resposta);
        finalizarAguardar();
      });

    return false;
  }

  function sumirMensagem() {
    cardErro.style.display = "none";
  }

</script>
